{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Shows • OLN4PEACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: url('{% static "images/Newbackground.jpeg" %}') center/cover fixed; }
        .cosmic-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-5xl mx-auto px-6 py-16">
        <a href="/main/" class="text-emerald-400 hover:text-emerald-300 text-lg">← Back to Sanctuary</a>
        <h1 class="text-5xl font-black text-emerald-400 text-center my-12">Radio Shows &amp; Conversations</h1>
        <div class="grid md:grid-cols-2 gap-8">
            {% for audio in audios %}
            <div class="cosmic-card rounded-3xl p-10">
                <h3 class="text-3xl font-medium">{{ audio.title }}</h3>
                <p class="text-gray-300 mt-4">{{ audio.description }}</p>
                <audio controls class="mt-8 w-full accent-emerald-400"><source src="{{ audio.audio_file.url }}"></audio>
            </div>
            {% empty %}
            <p class="text-yellow-300 text-center text-2xl py-12">No shows yet — add them in Admin</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
