{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Shows • OLN4PEACE</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
        }

        /* Container is hidden until the SVG is fully loaded to prevent waveforms appearing first */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            line-height: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .page-container.loaded {
            opacity: 1;
        }

        .main-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .audio-hotspot {
            position: absolute;
            left: 18%;          
            width: 60%;        
            height: 2.15%;     
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
            overflow: hidden;
        }

        /* Manually Calibrated Positions */
        .show-1  { top: 13.4%; }
        .show-2  { top: 19.4%; }
        .show-3  { top: 25.6%; }
        .show-4  { top: 31.5%; }
        .show-5  { top: 37.51%; }
        .show-6  { top: 43.8%; }
        .show-7  { top: 49.9%; }
        .show-8  { top: 56.0%; }
        .show-9  { top: 62.1%; }
        .show-10 { top: 68.3%; }
        .show-11 { top: 74.5%; }
        .show-12 { top: 80.5%; }
        .show-13 { top: 86.98%; }

        .play-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #c1ff72;
            border: 2px solid #106b0b;
            color: #106b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            transition: background 0.15s, transform 0.1s;
            box-shadow: 0 0 8px rgba(193,255,114,0.4);
        }
        .play-btn:hover  { background: #d6ff96; transform: scale(1.06); }
        .play-btn:active { transform: scale(0.94); }
        .play-btn svg    { width: 14px; height: 14px; }

        .waveform-canvas {
            flex: 1;
            height: 100%;
            min-width: 0;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="page-container" id="mainContainer">

    <img src="{% static 'images/long_versionradioshow_oln.svg' %}" class="main-svg" alt="Radio Shows" id="bgSvg">

    {% for audio in audios %}
    <div class="audio-hotspot show-{{ forloop.counter }}">
        <button class="play-btn" data-audio-id="{{ audio.id }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <canvas class="waveform-canvas" data-audio-id="{{ audio.id }}"></canvas>
        <audio id="audio-{{ audio.id }}" src="{{ audio.audio_file.url }}" preload="metadata"></audio>
    </div>
    {% endfor %}

</div>

<script>
// Icons as HTML strings
const ICON_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

// ----- Helper: draw waveform on canvas -----
function drawWaveform(canvas, progress = 0) {
    if (!canvas) return;
    const W = canvas.offsetWidth;
    const H = canvas.offsetHeight;
    if (!W || !H) return;

    if (canvas.width !== W || canvas.height !== H) {
        canvas.width  = W;
        canvas.height = H;
    }

    const ctx   = canvas.getContext('2d');
    const BAR_W = 4;
    const GAP   = 2;
    const STEP  = BAR_W + GAP;
    const bars  = Math.floor(W / STEP);
    const cx    = H / 2;
    const r     = BAR_W / 2;

    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < bars; i++) {
        const x = i * STEP;
        const t = i / bars;

        const raw = Math.sin(i * 0.310) * 0.35 + Math.sin(i * 0.173 + 1.20) * 0.27 + Math.sin(i * 0.091 + 0.50) * 0.20;
        const amp = Math.abs(raw);
        const envelope = 0.55 + 0.45 * Math.sin(t * Math.PI * 3.0);
        const barH = Math.max(3, (0.08 + amp * envelope) * (H - 4));
        const y = cx - barH / 2;

        const grad = ctx.createLinearGradient(x, y, x, y + barH);
        if (t < progress) {
            grad.addColorStop(0, 'rgba(193,255,114,0.30)');
            grad.addColorStop(0.25, '#c1ff72');
            grad.addColorStop(0.75, '#c1ff72');
            grad.addColorStop(1, 'rgba(193,255,114,0.30)');
        } else {
            grad.addColorStop(0, 'rgba(16,107,11,0.20)');
            grad.addColorStop(0.25, '#106b0b');
            grad.addColorStop(0.75, '#106b0b');
            grad.addColorStop(1, 'rgba(16,107,11,0.20)');
        }
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, BAR_W, barH, r);
        ctx.fill();
    }
}

// RoundRect helper (if not natively supported)
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y);
        this.quadraticCurveTo(x+w, y, x+w, y+r);
        this.lineTo(x+w, y+h-r);
        this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        this.lineTo(x+r, y+h);
        this.quadraticCurveTo(x, y+h, x, y+h-r);
        this.lineTo(x, y+r);
        this.quadraticCurveTo(x, y, x+r, y);
        this.closePath();
        return this;
    };
}

// ----- Global state -----
let currentAudio = null;      // The <audio> element currently playing (or paused but selected)
let currentButton = null;     // The corresponding play button
let currentCanvas = null;     // The waveform canvas
let animationFrameId = null;   // For progress animation

function stopAnimation() {
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
}

function startProgressAnimation(audio, canvas) {
    stopAnimation();
    function update() {
        if (!audio.paused && audio.duration) {
            const progress = audio.currentTime / audio.duration;
            drawWaveform(canvas, progress);
            animationFrameId = requestAnimationFrame(update);
        } else {
            // If paused or ended, draw final progress (if ended, draw full)
            if (audio.ended) drawWaveform(canvas, 1);
            else drawWaveform(canvas, audio.currentTime / audio.duration || 0);
            stopAnimation();
        }
    }
    update();
}

// Pause any currently playing audio and reset its button
function pauseAllExcept(exceptAudioId) {
    if (currentAudio && currentAudio.id !== 'audio-' + exceptAudioId) {
        if (!currentAudio.paused) {
            currentAudio.pause();
            console.log(`Pausing previous audio: ${currentAudio.id}`);
        }
        if (currentButton) {
            currentButton.innerHTML = ICON_PLAY;
        }
        currentAudio = null;
        currentButton = null;
        if (currentCanvas) {
            // Draw final progress at the moment it was paused
            drawWaveform(currentCanvas, currentCanvas.pausedProgress || 0);
            currentCanvas = null;
        }
        stopAnimation();
    }
}

// Event: click on play button
function onPlayClick(btn, audio, canvas) {
    const audioId = audio.id.split('-')[1];
    console.log(`[DEBUG] Play button clicked for audio ID ${audioId}, current paused state: ${audio.paused}`);
    
    pauseAllExcept(audioId);
    
    if (audio.paused) {
        // Try to play
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                console.log(`[DEBUG] Play succeeded for ${audio.id}`);
                btn.innerHTML = ICON_PAUSE;
                currentAudio = audio;
                currentButton = btn;
                currentCanvas = canvas;
                startProgressAnimation(audio, canvas);
            }).catch(error => {
                console.error(`[ERROR] Play failed for ${audio.id}:`, error);
                // Reset button to play icon
                btn.innerHTML = ICON_PLAY;
                // Optionally show user feedback
                alert("Playback failed. Check console or network.");
            });
        }
    } else {
        // Pause current audio
        console.log(`[DEBUG] Pausing ${audio.id}`);
        audio.pause();
        btn.innerHTML = ICON_PLAY;
        // Store current progress for canvas
        const prog = audio.duration ? audio.currentTime / audio.duration : 0;
        drawWaveform(canvas, prog);
        if (currentAudio === audio) {
            currentAudio = null;
            currentButton = null;
            currentCanvas = null;
        }
        stopAnimation();
    }
}

// Event: seek via canvas click
function onSeekCanvas(event, canvas, audio) {
    if (!audio.duration) return;
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const ratio = Math.min(1, Math.max(0, x / rect.width));
    audio.currentTime = ratio * audio.duration;
    console.log(`[DEBUG] Seeked ${audio.id} to ${audio.currentTime}s (${Math.round(ratio*100)}%)`);
    drawWaveform(canvas, ratio);
    // If audio is playing, let the animation update waveform; if paused, keep the drawn seek point.
}

// Handle audio ended event
function onAudioEnded(audio, btn, canvas) {
    console.log(`[DEBUG] ${audio.id} ended naturally`);
    btn.innerHTML = ICON_PLAY;
    drawWaveform(canvas, 1);
    if (currentAudio === audio) {
        currentAudio = null;
        currentButton = null;
        currentCanvas = null;
        stopAnimation();
    }
}

// Initialize all players: remove inline onclick, attach listeners, draw initial waveforms
function initPlayers() {
    const containers = document.querySelectorAll('.audio-hotspot');
    containers.forEach(container => {
        const btn = container.querySelector('.play-btn');
        const canvas = container.querySelector('.waveform-canvas');
        const audio = container.querySelector('audio');
        if (!btn || !canvas || !audio) return;
        
        const audioId = audio.id.split('-')[1];
        console.log(`[INIT] Setting up player for audio ID ${audioId}`);
        
        // Remove any existing inline onclick (just in case)
        btn.removeAttribute('onclick');
        canvas.removeAttribute('onclick');
        
        // Attach event listeners
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        const newCanvas = canvas.cloneNode(true);
        canvas.parentNode.replaceChild(newCanvas, canvas);
        
        const finalBtn = newBtn;
        const finalCanvas = newCanvas;
        const finalAudio = audio;
        
        finalBtn.addEventListener('click', (e) => {
            e.preventDefault();
            onPlayClick(finalBtn, finalAudio, finalCanvas);
        });
        
        finalCanvas.addEventListener('click', (e) => {
            onSeekCanvas(e, finalCanvas, finalAudio);
        });
        
        finalAudio.addEventListener('ended', () => {
            onAudioEnded(finalAudio, finalBtn, finalCanvas);
        });
        
        // Also listen for play/pause externally? not needed
        // Draw initial waveform (progress 0)
        drawWaveform(finalCanvas, 0);
    });
}

// When SVG background loads, reveal container
function initUI() {
    const container = document.getElementById('mainContainer');
    const bgSvg = document.getElementById('bgSvg');
    
    const finishLoad = () => {
        initPlayers();
        container.classList.add('loaded');
        console.log('[INIT] All players initialized, container revealed.');
    };
    
    if (bgSvg.complete) {
        finishLoad();
    } else {
        bgSvg.addEventListener('load', finishLoad);
    }
}

// Handle window resize to redraw waveforms for currently visible (if any)
window.addEventListener('resize', () => {
    const allCanvases = document.querySelectorAll('.waveform-canvas');
    allCanvases.forEach(canvas => {
        const audioId = canvas.getAttribute('data-audio-id');
        const audio = document.getElementById(`audio-${audioId}`);
        if (audio) {
            const prog = audio.duration ? audio.currentTime / audio.duration : 0;
            drawWaveform(canvas, prog);
        } else {
            drawWaveform(canvas, 0);
        }
    });
});

document.addEventListener('DOMContentLoaded', initUI);
</script>
</body>
</html>
