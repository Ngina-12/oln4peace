{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Shows • OLN4PEACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; }
        
        /* The container keeps the aspect ratio of your SVG */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* Limits width on tablets/desktops */
            margin: 0 auto;
            line-height: 0; /* Removes tiny gaps below images */
        }

        .main-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Hotspot Logic */
        .audio-hotspot {
            position: absolute;
            width: 80%;
            left: 10%;
            height: 2.2%; /* Relative to the total length of the long SVG */
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        /* Positioning: You will need to adjust these % values once 
           to match the new "Long Version" SVG's visual layout.
        */
        .show-1  { top: 18.5%; }
        .show-2  { top: 25.2%; }
        .show-3  { top: 31.8%; }
        /* ... add through show-14 ... */

        .play-btn {
            width: 40px; height: 40px;
            background: #c1ff72; border: 2px solid #106b0b;
            border-radius: 50%; color: #106b0b;
            flex-shrink: 0; cursor: pointer;
        }

        .waveform-canvas {
            flex: 1; height: 35px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <img src="{% static 'images/long_versionradioshow_oln.svg' %}" class="main-svg" alt="Radio Shows">

        {% for audio in audios %}
        <div class="audio-hotspot show-{{ forloop.counter }}">
            <button class="play-btn" onclick="togglePlay(this, 'audio-{{ audio.id }}')">▶</button>
            <canvas class="waveform-canvas" data-id="{{ audio.id }}"></canvas>
            <audio id="audio-{{ audio.id }}" src="{{ audio.audio_file.url }}" preload="none"></audio>
        </div>
        {% endfor %}
    </div>

    <script>
        // Use a single drawing function to keep the JS light
        function drawWaveform(canvas, progress = 0) {
            const ctx = canvas.getContext('2d');
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            canvas.width = w; canvas.height = h;

            const barWidth = 3;
            const gap = 2;
            const bars = Math.floor(w / (barWidth + gap));

            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < bars; i++) {
                const x = i * (barWidth + gap);
                const barH = h * (0.5 + Math.abs(Math.sin(i * 0.2)) * 0.4);
                const y = (h - barH) / 2;
                ctx.fillStyle = (i / bars < progress) ? '#c1ff72' : '#106b0b';
                ctx.fillRect(x, y, barWidth, barH);
            }
        }

        function togglePlay(btn, audioId) {
            const audio = document.getElementById(audioId);
            const isPaused = audio.paused;

            // Pause everything else
            document.querySelectorAll('audio').forEach(a => {
                a.pause();
                a.parentElement.querySelector('.play-btn').textContent = '▶';
            });

            if (isPaused) {
                audio.play();
                btn.textContent = '⏸';
                updateFrame(audio);
            }
        }

        function updateFrame(audio) {
            if (!audio.paused) {
                const canvas = audio.parentElement.querySelector('canvas');
                drawWaveform(canvas, audio.currentTime / audio.duration);
                requestAnimationFrame(() => updateFrame(audio));
            }
        }

        // Init waveforms on load
        window.onload = () => {
            document.querySelectorAll('.waveform-canvas').forEach(c => drawWaveform(c, 0));
        };
    </script>
</body>
</html>
