{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Workbooks • OLN4PEACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: url('{% static "images/Newbackground.jpeg" %}') center/cover fixed; }
        .cosmic-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-5xl mx-auto px-6 py-16">
        <a href="/main/" class="text-emerald-400 hover:text-emerald-300 text-lg">← Back to Sanctuary</a>
        <h1 class="text-5xl font-black text-amber-400 text-center my-12">Companion Workbooks</h1>
        <div class="grid md:grid-cols-3 gap-8">
            {% for wb in workbooks %}
            <div class="cosmic-card rounded-3xl overflow-hidden">
                {% if wb.cover_image %}<img src="{{ wb.cover_image.url }}" class="w-full h-56 object-cover">{% endif %}
                <div class="p-10">
                    <h3 class="text-2xl font-medium">{{ wb.title }}</h3>
                    <p class="text-gray-300 mt-4">{{ wb.description }}</p>
                    <a href="{{ wb.pdf_file.url }}" download class="mt-8 block w-full py-5 bg-gradient-to-r from-amber-400 to-yellow-400 text-black font-bold rounded-2xl text-center">Download PDF ✨</a>
                </div>
            </div>
            {% empty %}
            <p class="col-span-3 text-yellow-300 text-center text-2xl py-12">No workbooks yet — upload in Admin</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
