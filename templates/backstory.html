{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLN Backstory • One Love Nation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'ITC Bauhaus';
            src: local('ITC Bauhaus Light Regular'); 
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'ITC Bauhaus', sans-serif;
            background-color: #4a0000;
            scroll-behavior: smooth;
        }

        .long-page-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .long-svg-bg {
            display: block;
            width: 100%;
            height: auto;
        }

        .hotspot-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .hotspot:hover {
            background-color: rgba(255, 215, 0, 0.1); 
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- ====================== PAGE 1 ====================== -->
    <div class="long-page-container">
        <img src="{% static 'images/OLNbackstory.svg' %}" alt="OLN Backstory" class="long-svg-bg">
        
        <div class="hotspot-container">
            <a href="/main/" class="absolute top-4 left-6 text-yellow-300 text-lg hover:text-white z-20 transition-colors">
                ← 
            </a>
            
            <button class="hotspot rounded-md" style="top: 5%; right: 10%; width: 20%; height: 2%;" onclick="openModal('intro')"></button>
            <button class="hotspot" style="top: 50%; left: 15%; width: 70%; height: 3%; border-radius: 2%;" onclick="playVideo()"></button>
            <a href="/youtube-link/" class="hotspot" style="top: 90%; left: 15%; width: 33%; height: 4%; transform: skewY(-2deg);"></a>
        </div>
    </div>

    <!-- ====================== PAGE 2 ====================== -->
    <div class="long-page-container">
        <img src="{% static 'images/OLNbackstory.svg' %}" alt="OLN Page 2" class="long-svg-bg">
        
        <div class="hotspot-container">
            <!-- Add your new hotspots for page 2 here later -->
        </div>
    </div>

    <!-- ====================== PAGE 3 ====================== -->
    <div class="long-page-container">
        <img src="{% static 'images/OLNbackstory.svg' %}" alt="OLN Page 3" class="long-svg-bg">
        
        <div class="hotspot-container">
            <!-- Add your new hotspots for page 3 here later -->
        </div>
    </div>

    <!-- ====================== PAGE 4 ====================== -->
    <div class="long-page-container">
        <img src="{% static 'images/OLNbackstory.svg' %}" alt="OLN Page 4" class="long-svg-bg">
        
        <div class="hotspot-container">
            <!-- Add your new hotspots for page 4 here later -->
        </div>
    </div>

    <!-- ====================== PAGE 5 ====================== -->
    <div class="long-page-container">
        <img src="{% static 'images/OLNbackstory.svg' %}" alt="OLN Page 5" class="long-svg-bg">
        
        <div class="hotspot-container">
            <!-- Add your new hotspots for page 5 here later -->
        </div>
    </div>

    <script>
        function openModal(sectionId) {
            console.log("Opening modal for:", sectionId);
        }

        function playVideo() {
            console.log("Playing video...");
        }
    </script>
</body>
</html>
