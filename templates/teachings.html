{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachings &amp; Wisdom • OLN4PEACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: url('{% static "images/Newbackground.jpeg" %}') center/cover fixed; }
        .cosmic-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-5xl mx-auto px-6 py-16">
        <a href="/main/" class="text-emerald-400 hover:text-emerald-300 text-lg">← Back to Sanctuary</a>
        <h1 class="text-5xl font-black text-purple-400 text-center my-12">Teachings &amp; Wisdom</h1>
        {% for art in articles %}
        <div class="cosmic-card rounded-3xl p-12 mb-12">
            <h3 class="text-3xl font-medium">{{ art.title }}</h3>
            <div class="prose prose-invert mt-8">{{ art.content|safe }}</div>
        </div>
        {% empty %}
        <p class="text-yellow-300 text-center text-2xl py-12">No teachings yet — add in Admin</p>
        {% endfor %}
    </div>
</body>
</html>
