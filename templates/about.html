{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About One Love Nation • OLN4PEACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
	    body { background: url('{% static "images/Newbackground.jpeg" %}') center/cover fixed; }
        .cosmic-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-4xl mx-auto px-6 py-20 text-center">
        <a href="/main/" class="text-emerald-400 hover:text-emerald-300 text-lg">← Back to Sanctuary</a>
        <h1 class="text-5xl font-black text-cyan-400 text-center my-12">About One Love Nation</h1>
        {% if about %}
        <div class="cosmic-card rounded-3xl p-16 text-xl leading-relaxed">{{ about.content|safe }}</div>
        {% else %}
        <p class="text-yellow-300 text-2xl">Add About content in Admin panel</p>
        {% endif %}
    </div>
</body>
</html>
