{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Love Nation • The Adventures</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @font-face {
            font-family: 'Chromium One Std';
            src: url('{% static "fonts/Chromium One Std Regular.otf" %}') format('opentype');
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }
		
		body::before {
          content: '';
          position: fixed;
          inset: 0;
          z-index: -1;
          background: url('{% static "images/OLN HOMEPAGE.webp" %}') center top / cover no-repeat;
        }

        /* HERO SECTION */
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 40px;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .media-placeholders {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
        }

        /* UPDATED PLACEHOLDER WITH HOTSPOT SUPPORT */
        .placeholder-image {
            position: relative; /* Required for hotspot positioning */
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            width: 1%;
            margin: 20px auto 0;
			aspect-ratio: 5 / 4;
			z-index: 5;
			margin: 115px auto 0;
        }

        .placeholder-youtube {
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            width: 78%;
            margin: -160px auto 0;
        }

        .placeholder-image img,
        .placeholder-youtube img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        /* HOTSPOT OVERLAY STYLES */
        .hotspot-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 10;
        }

        .hotspot {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.3s;
        }

        .hotspot:hover {
            background: rgba(212, 175, 55, 0.1); /* Subtle gold tint on hover */
        }

        .text-graphic {
            width: 100%;
            max-width: 1080px;
            margin-top: -180px;
            position: relative;
            z-index: 3;
        }

        .text-graphic img {
            width: 100%;
            height: auto;
            display: block;
			margin-top: -300px;
			transform: scale(1.35);
        }

        /* PORTALS SECTION */
        .portal-section {
            position: relative;
            padding: 100px 20px 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .portal-title-container { 
            text-align: center; 
            margin-bottom: 50px; 
        }
        
        .chromium { 
            font-family: 'Chromium One Std'; 
            font-size: 2.8rem; 
            color: #D4AF37; 
        }
        .rubik { 
            font-family: 'Rubik One'; 
            font-size: 0.95rem; 
            color: #D4AF37; 
        }

        .gem-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1080px;
            gap: 90px;
        }

        .gem-link {
            display: block;
            width: 100%;
            transform: scale(2.1);
            transition: transform 0.2s ease-in-out;
        }

        .gem-link:hover {
            transform: scale(2.22);
        }

        .gem-link img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .placeholder-image { width: 72%; }
            .placeholder-youtube { width: 92%; margin-top: -110px; }
            .text-graphic { margin-top: -140px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="hero-section">
        <div class="content-wrapper">
            <div class="media-placeholders">
                <div class="placeholder-image">
                    
                    <div class="hotspot-overlay">
                        <div class="hotspot" onmouseenter="updateHotspot(0)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(1)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(2)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(3)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(4)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(5)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(6)"></div>
                        <div class="hotspot" onmouseenter="updateHotspot(7)"></div>
                    </div>
                </div>

                <div class="placeholder-youtube" onclick="window.open('https://youtu.be/DKffexpK348', '_blank')">
                </div>
            </div>

            <div class="text-graphic">
            </div>
        </div>
    </div>

    <div class="portal-section">
        <div class="portal-title-container">
            <span class="chromium">EXPLORE</span> 
            <span class="rubik">our</span> 
            <span class="chromium">PORTALS</span><br>
            <span class="rubik">within the portal</span>
        </div>

        <div class="gem-stack">
            <a href="/backstory/" class="gem-link">
                <img src="{% static 'images/OLN Backstory.png' %}" alt="Backstory">
            </a>
            <a href="/response-to-windrush/" class="gem-link">
                <img src="{% static 'images/Responsetowindrush.png' %}" alt="Windrush">
            </a>
            <a href="/radio-shows/" class="gem-link">
                <img src="{% static 'images/OLN Radio Shows.png' %}" alt="Radio">
            </a>
            <a href="/books/" class="gem-link">
                <img src="{% static 'images/OLN Books.png' %}" alt="Books">
            </a>
            <a href="/companion-workbooks/" class="gem-link">
                <img src="{% static 'images/OLN Companion Workbooks.png' %}" alt="Workbooks">
            </a>
            <a href="/film_archives/" class="gem-link">
                <img src="{% static 'images/Film Archive.png' %}" alt="Film Archives">
            </a>
            <a href="/music/" class="gem-link">
                <img src="{% static 'images/OLN Music.png' %}" alt="Music">
            </a>
            <a href="/merangels-art/" class="gem-link">
                <img src="{% static 'images/Merangles art gallery.png' %}" alt="Art">
            </a>
            <a href="/photo-gallery/" class="gem-link">
                <img src="{% static 'images/OLN Photo Gallery.png' %}" alt="Gallery">
            </a>
            <a href="/rainbows-end/" class="gem-link">
                <img src="{% static 'images/Rainbows end.png' %}" alt="Rainbows End">
            </a>
            <a href="/shop/" class="gem-link">
                <img src="{% static 'images/Old shop.png' %}" alt="Shop">
            </a>
        </div>
    </div>

    <script>
        // HOTSPOT LOGIC
        const hotspotImages = [
            "{% static 'images/image.webp' %}",
            "{% static 'images/1.png' %}",
            "{% static 'images/9.png' %}",
            "{% static 'images/7.png' %}",
            "{% static 'images/6.png' %}",
            "{% static 'images/5.png' %}",
            "{% static 'images/8.png' %}",
            "{% static 'images/2.png' %}"
        ];

        function updateHotspot(index) {
            const display = document.getElementById('hotspot-display');
            if (hotspotImages[index]) {
                display.src = hotspotImages[index];
            }
        }

        // CAROUSEL MODAL LOGIC
        function showCarousel() {
            const carouselHTML = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:9999;display:flex;align-items:center;justify-content:center;" onclick="this.remove()">
                    <div style="max-width:92%;max-height:92vh;position:relative;" onclick="event.stopImmediatePropagation()">
                        <button onclick="this.closest('div[style*=\'inset:0\']').remove()" 
                                style="position:absolute;top:-55px;right:10px;color:white;font-size:2.5rem;background:none;border:none;cursor:pointer;z-index:1000;">✕</button>
                        
                        <div style="position:relative;">
                            <img src="${hotspotImages[0]}" class="modal-slide active" style="width:100%;border-radius:12px;">
                            <img src="${hotspotImages[1]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[2]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[3]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[4]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[5]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[6]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                            <img src="${hotspotImages[7]}" class="modal-slide" style="width:100%;border-radius:12px;display:none;">
                        </div>
                        
                        <div style="text-align:center;margin-top:25px;color:#D4AF37;font-size:1.8rem;">
                            <button onclick="prevSlide()" style="margin:0 20px;">←</button>
                            <button onclick="nextSlide()" style="margin:0 20px;">→</button>
                        </div>
                    </div>
                </div>
            `;
            
            const modal = document.createElement('div');
            modal.innerHTML = carouselHTML;
            document.body.appendChild(modal);
            window.currentModalSlide = 0;
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.modal-slide');
            slides[window.currentModalSlide].style.display = 'none';
            window.currentModalSlide = (window.currentModalSlide + 1) % slides.length;
            slides[window.currentModalSlide].style.display = 'block';
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.modal-slide');
            slides[window.currentModalSlide].style.display = 'none';
            window.currentModalSlide = (window.currentModalSlide - 1 + slides.length) % slides.length;
            slides[window.currentModalSlide].style.display = 'block';
        }
    </script>
</body>
</html>
