{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response to Windrush • YouTube Poems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            /* Using response_to_windushyoutube.svg as the background */
            background: url('{% static "images/response_to_windushyoutube.svg" %}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            padding: 4rem 1rem;
        }

        .cursive-title {
            font-family: 'Great Vibes', cursive;
            text-shadow: 2px 2px 0px #000;
        }

        /* Subtle Button Styling */
        .btn-subtle {
            color: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
        }

        .btn-subtle:hover {
            color: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    
     <!-- Subtle Next Page Button[cite: 1] -->
    <footer class="mt-auto">
        <a href="/response-to-windrush-index/" class="btn-subtle">
            Next Page —&gt;
        </a>
    </footer>

</body>
</html>
